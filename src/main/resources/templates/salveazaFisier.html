<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Salvează Fișier - Cinema</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
  <div class="navbar-links">
    <a th:href="@{/program}">📅 Program</a>
    <a th:href="@{/afisareRezervari}">📋 Rezervări</a>
    <a th:href="@{/verificareCapacitate}">💺 Capacitate</a>
    <a th:href="@{/logout}" class="logout">⏻ Logout</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>💾 Salvează Fișier</h1>
    <a th:href="@{/}" class="btn btn-secondary">← Înapoi</a>
  </div>

  <div th:if="${success}" class="card">
    <div class="alert alert-success">
      <span th:text="${success}"></span>
    </div>
    <p>Fișierul <strong>rezervari.txt</strong> a fost salvat în directorul proiectului.</p>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <span th:text="${error}"></span>
  </div>
</div>

</body>
</html>
