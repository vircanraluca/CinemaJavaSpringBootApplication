<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Reservations</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; margin: 0; }
    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    .page-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 30px; border-bottom: 2px solid #e50914; padding-bottom: 15px;
    }
    .page-header h1 { margin: 0; font-size: 1.8rem; color: #fff; }
    .page-header h1 span { color: #e50914; }
    .back-link { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #fff; }

    .reservation-list { display: flex; flex-direction: column; gap: 14px; }

    .reservation-card {
        background: #1a1a1a; border: 1px solid #2a2a2a;
        border-radius: 10px; padding: 20px;
        display: flex; align-items: center; justify-content: space-between;
        transition: border-color 0.2s;
    }
    .reservation-card:hover { border-color: #333; }

    .reservation-info { display: flex; gap: 30px; align-items: center; }

    .movie-title { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 6px; }

    .reservation-details { display: flex; gap: 16px; flex-wrap: wrap; }
    .detail-badge {
        background: #2a2a2a; padding: 4px 10px;
        border-radius: 5px; font-size: 0.8rem; color: #aaa;
    }

    .ticket-badge {
        padding: 4px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold;
    }
    .ticket-badge.standard { background: #2a2a2a; color: #aaa; }
    .ticket-badge.vip { background: rgba(229,9,20,0.15); color: #e50914; }

    .paid-badge {
        padding: 4px 10px; border-radius: 5px; font-size: 0.78rem;
    }
    .paid-badge.paid { background: rgba(0,200,100,0.15); color: #00c864; }
    .paid-badge.unpaid { background: rgba(229,9,20,0.15); color: #e50914; }

    .price { font-size: 1.1rem; font-weight: bold; color: #e50914; margin-right: 16px; }

    .btn-cancel {
        background: #2a2a2a; color: #aaa; padding: 7px 14px;
        border: none; border-radius: 6px; cursor: pointer;
        font-size: 0.85rem; transition: all 0.2s;
    }
    .btn-cancel:hover { background: #e50914; color: #fff; }

    .empty-state {
        text-align: center; padding: 60px; color: #555;
    }
    .empty-state a { color: #e50914; text-decoration: none; }
  </style>
</head>
<body>

<nav class="navbar" sec:authorize="isAuthenticated()">
  <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
  <div class="navbar-links">
    <a th:href="@{/program}">📅 Schedule</a>
    <a th:href="@{/my-reservations}" sec:authorize="!hasRole('ROLE_ADMIN')">🎟️ My Reservations</a>
    <a th:href="@{/hallCapacity}">💺 Capacity</a>
    <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
    <a th:href="@{/admin/halls}" sec:authorize="hasRole('ROLE_ADMIN')">🏛️ Manage Halls</a>
    <a th:href="@{/admin/statistics}" sec:authorize="hasRole('ROLE_ADMIN')">📊 Statistics</a>
    <a th:href="@{/reservations}" sec:authorize="hasRole('ROLE_ADMIN')">📋 All Reservations</a>
    <a th:href="@{/saveFile}" sec:authorize="hasRole('ROLE_ADMIN')">💾 Save File </a>
    <a th:href="@{/logout}" class="logout">⏻ Logout</a>
  </div>
</nav>

<div class="page-wrapper">

  <div class="page-header">
    <h1>🎟️ <span>My</span> Reservations</h1>
    <a th:href="@{/}" class="back-link">← Back to Home</a>
  </div>

  <div th:if="${#lists.isEmpty(reservations)}" class="empty-state">
    <p>You have no reservations yet.</p>
    <a th:href="@{/program}">Browse movies and make a reservation! 🎬</a>
  </div>

  <div th:unless="${#lists.isEmpty(reservations)}" class="reservation-list">
    <div th:each="r : ${reservations}" class="reservation-card">

      <div>
        <div class="movie-title" th:text="${r.movie}"></div>
        <div class="reservation-details">
          <span class="detail-badge">📅 <span th:text="${r.reservationDate}"></span></span>
          <span class="detail-badge">💺 <span th:text="${r.seatLabel != null ? r.seatLabel : 'N/A'}"></span></span>
          <span class="detail-badge">🏛️ Hall <span th:text="${r.hallNumber}"></span></span>
          <span th:class="${r.ticketType == 'VIP'} ? 'ticket-badge vip' : 'ticket-badge standard'"
                th:text="${r.ticketType != null ? r.ticketType : 'N/A'}"></span>
          <span th:class="${r.paid} ? 'paid-badge paid' : 'paid-badge unpaid'"
                th:text="${r.paid} ? '✅ Paid' : '⏳ Unpaid'"></span>
        </div>
      </div>

      <div style="display:flex; align-items:center; gap:12px;">
        <span class="price" th:if="${r.price != null}" th:text="${r.price} + ' RON'"></span>
        <form th:action="@{/my-reservations/cancel/{id}(id=${r.id})}"
              method="post"
              onsubmit="return confirm('Are you sure you want to cancel this reservation?')">
          <input type="hidden" name="id" th:value="${r.id}"/>
          <button class="btn-cancel">✕ Cancel</button>
        </form>
      </div>

    </div>
  </div>

</div>
</body>
</html>
