<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Hall Schedule</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; margin: 0; }
    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    .page-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 30px; border-bottom: 2px solid #e50914; padding-bottom: 15px;
    }
    .page-header h1 { margin: 0; font-size: 1.8rem; color: #fff; }
    .page-header h1 span { color: #e50914; }
    .back-link { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #fff; }

    /* ADD FORM */
    .add-section {
        background: #1a1a1a; border: 1px solid #2a2a2a;
        border-radius: 10px; padding: 24px; margin-bottom: 30px;
    }
    .add-section h2 { margin: 0 0 18px 0; font-size: 1.1rem; color: #fff; }
    .add-section h2 span { color: #e50914; }
    .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; align-items: end; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; }
    .field-group input, .field-group select {
        padding: 9px 11px; border-radius: 6px; border: 1px solid #333;
        background: #0f0f0f; color: #fff; font-size: 0.9rem; box-sizing: border-box;
    }
    .field-group input:focus, .field-group select:focus { outline: none; border-color: #e50914; }
    .field-group select option { background: #1a1a1a; }
    .btn-add {
        background: #e50914; color: #fff; padding: 9px 20px;
        border: none; border-radius: 6px; cursor: pointer;
        font-weight: bold; font-size: 0.9rem; transition: background 0.2s;
    }
    .btn-add:hover { background: #c0070f; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    thead tr { background: #111; }
    th { padding: 13px 16px; text-align: left; color: #e50914; font-size: 0.82rem; text-transform: uppercase; }
    td { padding: 12px 16px; border-top: 1px solid #2a2a2a; color: #ddd; font-size: 0.93rem; }
    tr:hover td { background: #222; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.78rem; background: #2a2a2a; color: #aaa; }
    .btn-delete {
        background: #e50914; color: #fff; padding: 5px 12px;
        border: none; border-radius: 5px; cursor: pointer; font-size: 0.82rem;
    }
    .btn-delete:hover { opacity: 0.8; }
    .empty-state { text-align: center; padding: 40px; color: #555; }
  </style>
</head>
<body>

<nav class="navbar" sec:authorize="isAuthenticated()">
  <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
  <div class="navbar-links">
    <a th:href="@{/program}">📅 Schedule</a>
    <a th:href="@{/my-reservations}" sec:authorize="!hasRole('ROLE_ADMIN')">🎟️ My Reservations</a>
    <a th:href="@{/hallCapacity}">💺 Capacity</a>
    <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
    <a th:href="@{/admin/halls}" sec:authorize="hasRole('ROLE_ADMIN')">🏛️ Manage Halls</a>
    <a th:href="@{/admin/statistics}" sec:authorize="hasRole('ROLE_ADMIN')">📊 Statistics</a>
    <a th:href="@{/reservations}" sec:authorize="hasRole('ROLE_ADMIN')">📋 All Reservations</a>
    <a th:href="@{/logout}" class="logout">⏻ Logout</a>
  </div>
</nav>

<div class="page-wrapper">

  <div class="page-header">
    <h1>📅 <span>Hall <span th:text="${hallNumber}"></span></span> — Schedule</h1>
    <a th:href="@{/admin/halls}" class="back-link">← Back to Halls</a>
  </div>

  <!-- ADD FORM -->
  <div class="add-section">
    <h2>➕ <span>Add</span> New Showtime</h2>
    <form th:action="@{/admin/halls/showtime/add/{n}(n=${hallNumber})}" method="post">
      <div class="form-grid">
        <div class="field-group">
          <label>Movie</label>
          <select name="movie" required>
            <option value="">— Select Movie —</option>
            <option th:each="m : ${movies}" th:value="${m}" th:text="${m}"></option>
          </select>
        </div>
        <div class="field-group">
          <label>Date</label>
          <input type="date" name="showDate" required/>
        </div>
        <div class="field-group">
          <label>Time</label>
          <input type="time" name="showTime" required/>
        </div>
      </div>
      <div style="margin-top: 12px;">
        <button type="submit" class="btn-add">➕ Add Showtime</button>
      </div>
    </form>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
    <tr>
      <th>Movie</th>
      <th>Date</th>
      <th>Time</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(showtimes)}">
      <td colspan="4" class="empty-state">No showtimes scheduled. Add one above!</td>
    </tr>
    <tr th:each="st : ${showtimes}">
      <td th:text="${st.movie}"></td>
      <td th:text="${st.showDate}"></td>
      <td><span class="badge" th:text="${st.showTime}"></span></td>
      <td>
        <form th:action="@{/admin/halls/showtime/delete/{id}(id=${st.id})}"
              method="post"
              onsubmit="return confirm('Delete this showtime?')">
          <button class="btn-delete">🗑️ Delete</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

</div>
</body>
</html>
