<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Halls</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; margin: 0; }
        .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; border-bottom: 2px solid #e50914; padding-bottom: 15px;
        }
        .page-header h1 { margin: 0; font-size: 1.8rem; color: #fff; }
        .page-header h1 span { color: #e50914; }
        .back-link { color: #aaa; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #fff; }
        .halls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
        .hall-card {
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 20px; transition: border-color 0.2s;
        }
        .hall-card:hover { border-color: #e50914; }
        .hall-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .hall-number { font-size: 1.3rem; font-weight: bold; color: #e50914; }
        .hall-badge { background: #2a2a2a; color: #aaa; padding: 3px 10px; border-radius: 4px; font-size: 0.78rem; }
        .hall-badge.active { background: rgba(229,9,20,0.15); color: #e50914; }
        .field-group { margin-bottom: 12px; }
        .field-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 5px; }
        .field-group input {
            width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
            background: #0f0f0f; color: #fff; font-size: 0.9rem; box-sizing: border-box;
        }
        .field-group input:focus { outline: none; border-color: #e50914; }
        .btn-save {
            width: 100%; background: #e50914; color: #fff; padding: 9px;
            border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
            font-weight: bold; margin-top: 4px; transition: background 0.2s;
        }
        .btn-save:hover { background: #c0070f; }
        .btn-schedule {
            display: block; width: 100%; text-align: center;
            background: #2a2a2a; color: #fff; padding: 9px;
            border-radius: 6px; text-decoration: none; font-size: 0.9rem;
            margin-top: 10px; transition: background 0.2s;
        }
        .btn-schedule:hover { background: #444; }
        .showtime-count {
            font-size: 0.8rem; color: #888; margin-top: 8px; text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar" sec:authorize="isAuthenticated()">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/reservations}">📋 Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/saveFile}">💾 Save File</a>
        <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
        <a th:href="@{/admin/halls}" sec:authorize="hasRole('ROLE_ADMIN')">🏛️ Manage Halls</a>
        <a th:href="@{/admin/statistics}" sec:authorize="hasRole('ROLE_ADMIN')">📊 Statistics</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1>🏛️ <span>Manage</span> Halls</h1>
        <a th:href="@{/}" class="back-link">← Back to Home</a>
    </div>

    <div class="halls-grid">
        <div th:each="hall : ${halls}" class="hall-card">

            <div class="hall-card-header">
                <span class="hall-number">Hall <span th:text="${hall.hallNumber}"></span></span>
                <span th:class="${showtimesMap[hall.hallNumber].empty} ? 'hall-badge' : 'hall-badge active'"
                      th:text="${showtimesMap[hall.hallNumber].empty} ? 'Empty' : ${showtimesMap[hall.hallNumber].size()} + ' shows'">
                </span>
            </div>

            <form th:action="@{/admin/halls/update/{n}(n=${hall.hallNumber})}" method="post">
                <div class="field-group">
                    <label>💺 Capacity</label>
                    <input type="number" name="capacity"
                           th:value="${hall.capacity}"
                           min="1" max="500" required/>
                </div>
                <button type="submit" class="btn-save">💾 Save</button>
            </form>

            <a th:href="@{/admin/halls/{n}/schedule(n=${hall.hallNumber})}"
               class="btn-schedule">📅 Manage Schedule</a>

        </div>
    </div>
</div>
</body>
</html>
