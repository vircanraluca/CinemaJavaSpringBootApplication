<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Selectare Locuri</title>
    <link rel="stylesheet" th:href="@{/css/seats.css}"/>
</head>
<body>

<!-- POPUP EROARE -->
<div id="errorPopup" th:if="${error}" class="error-popup">
    <div class="error-popup-content">
        <span class="error-icon">⚠️</span>
        <p th:text="${error}"></p>
        <button onclick="document.getElementById('errorPopup').style.display='none'"
                class="btn-close-popup">OK</button>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Program</a>
        <a th:href="@{/afisareRezervari}">📋 Rezervări</a>
        <a th:href="@{/verificareCapacitate}">💺 Capacitate</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="page-container">

    <div class="movie-info">
        <h1 th:text="${film}">Nume Film</h1>
        <div class="sala-selector">
            <label>🏛️ Selectează sala:</label>
            <select id="salaSelect">
                <option value="">-- Alege sala --</option>
                <option value="1">Sala 1</option>
                <option value="2">Sala 2</option>
                <option value="3">Sala 3</option>
                <option value="4">Sala 4</option>
                <option value="5">Sala 5</option>
                <option value="6">Sala 6</option>
                <option value="7">Sala 7</option>
                <option value="8">Sala 8</option>
                <option value="9">Sala 9</option>
            </select>
            <span id="salaInfo"></span>
        </div>
    </div>

    <!-- ECRAN -->
    <div class="screen-wrapper">
        <div class="screen">ECRAN</div>
        <div class="screen-shadow"></div>
    </div>

    <!-- SALA -->
    <div class="cinema-hall">
        <div th:each="rand, rowStat : ${randuri}"
             th:class="'row row-' + ${rowStat.index}"
             class="seat-row">
            <span class="row-label" th:text="${rand.litera}">A</span>
            <div class="seats">
                <div th:each="seat : ${rand.locuri}"
                     th:class="'seat ' + (${seat.ocupat} ? 'occupied' : 'available')"
                     th:attr="data-seat=${rand.litera + seat.numar}"
                     th:text="${seat.numar}">
                </div>
            </div>
            <span class="row-label" th:text="${rand.litera}">A</span>
        </div>
    </div>

    <!-- LEGENDA -->
    <div class="legend">
        <div class="legend-item">
            <div class="seat available"></div>
            <span>Liber</span>
        </div>
        <div class="legend-item">
            <div class="seat occupied"></div>
            <span>Ocupat</span>
        </div>
        <div class="legend-item">
            <div class="seat selected"></div>
            <span>Selectat</span>
        </div>
    </div>

    <!-- FORMULAR CONFIRMARE -->
    <div class="confirm-panel" id="confirmPanel">
        <form th:action="@{/rezervare}" method="post">
            <input type="hidden" name="film" th:value="${film}"/>
            <input type="hidden" name="locuri" id="locuriInput" value="1"/>
            <input type="hidden" name="nrSala" id="nrSalaHidden" value=""/>

            <div class="confirm-header">
                <h3>🎟️ Finalizează Rezervarea</h3>
                <div class="confirm-movie-badge">
                    <span class="movie-name" th:text="${film}"></span>
                    <span class="seat-badge">💺 <span id="selectedSeatLabel">-</span></span>
                </div>
            </div>

            <div class="confirm-fields">
                <div class="field-group">
                    <label><span class="field-icon">👤</span>Numele tău</label>
                    <input type="text" name="nume" placeholder="ex: Ion Popescu"
                           required autocomplete="off"/>
                </div>

                <div class="confirm-row">
                    <div class="field-group">
                        <label><span class="field-icon">🏛️</span>Sală selectată</label>
                        <input type="text" id="salaDisplay" readonly
                               placeholder="Selectează sala mai sus"/>
                    </div>

                    <div class="field-group">
                        <label><span class="field-icon">📅</span>Data rezervării</label>
                        <input type="date" name="dataRezervare" required/>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-confirm">
                <span>✅</span> Confirmă Rezervarea
            </button>
        </form>
    </div>

</div>

<script>
    function adaugaEventListeners() {
     document.querySelectorAll('.seat.available').forEach(seat => {
         seat.removeEventListener('click', seatClickHandler);
         seat.addEventListener('click', seatClickHandler);
     });
 }

 function seatClickHandler() {
     const nrSala = document.getElementById('salaSelect').value;
     if (!nrSala) {
         alert('Te rugăm să selectezi o sală mai întâi!');
         return;
     }

     document.querySelectorAll('.seat.selected').forEach(s => {
         s.classList.remove('selected');
         s.classList.add('available');
     });

     this.classList.remove('available');
     this.classList.add('selected');

     const seatId = this.getAttribute('data-seat');
     const salaText = document.getElementById('salaSelect').options[
         document.getElementById('salaSelect').selectedIndex
     ].text;

     document.getElementById('selectedSeatLabel').textContent = seatId;
     document.getElementById('nrSalaHidden').value = nrSala;
     document.getElementById('salaDisplay').value = salaText;
     document.getElementById('confirmPanel').classList.add('visible');
 }

 document.getElementById('salaSelect').addEventListener('change', function() {
     const nrSala = this.value;
     if (!nrSala) return;

     const salaText = this.options[this.selectedIndex].text; // ← definit corect aici

     fetch(`/seats/ocupate?nrSala=${nrSala}`)
         .then(res => res.json())
         .then(data => {
             const locuriOcupate = data.locuriOcupate;
             const seats = document.querySelectorAll('.cinema-hall .seat');

             seats.forEach((seat, index) => {
                 seat.classList.remove('occupied', 'available', 'selected');
                 if (index < locuriOcupate) {
                     seat.classList.add('occupied');
                 } else {
                     seat.classList.add('available');
                 }
             });

             document.getElementById('salaInfo').textContent =
                 `${20 - locuriOcupate} locuri libere`;
             document.getElementById('selectedSeatLabel').textContent = '-';
             document.getElementById('salaDisplay').value = salaText;
             document.getElementById('confirmPanel').classList.remove('visible');
             document.getElementById('nrSalaHidden').value = '';

             adaugaEventListeners();
         });
 });

 adaugaEventListeners();
</script>

</body>
</html>
