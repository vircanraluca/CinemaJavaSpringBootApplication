<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Seat Selection</title>
    <link rel="stylesheet" th:href="@{/css/seats.css}"/>
</head>
<body>

<div id="errorPopup" th:if="${error}" class="error-popup">
    <div class="error-popup-content">
        <span class="error-icon">⚠️</span>
        <p th:text="${error}"></p>
        <button onclick="document.getElementById('errorPopup').style.display='none'"
                class="btn-close-popup">OK</button>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar" sec:authorize="isAuthenticated()">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/my-reservations}" sec:authorize="!hasRole('ROLE_ADMIN')">🎟️ My Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
        <a th:href="@{/admin/halls}" sec:authorize="hasRole('ROLE_ADMIN')">🏛️ Manage Halls</a>
        <a th:href="@{/admin/statistics}" sec:authorize="hasRole('ROLE_ADMIN')">📊 Statistics</a>
        <a th:href="@{/reservations}" sec:authorize="hasRole('ROLE_ADMIN')">📋 All Reservations</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="page-container">

    <div class="movie-info">
        <h1 th:text="${movie}">Movie name</h1>
        <div class="sala-selector">
            <label>🕐 Select show time:</label>
            <select id="showtimeSelect">
                <option value="">-- Select Time --</option>
                <option th:each="st : ${showtimes}"
                        th:value="${st.id}"
                        th:attr="data-hall=${st.hallNumber}"
                        th:text="${st.showTime} + ' — Hall ' + ${st.hallNumber}">
                </option>
            </select>
            <span id="salaInfo"></span>
        </div>
    </div>

    <div class="screen-wrapper">
        <div class="screen">SCREEN</div>
        <div class="screen-shadow"></div>
    </div>

    <div class="cinema-hall">
        <div th:each="row, rowStat : ${rows}"
             th:class="'row row-' + ${rowStat.index}"
             class="seat-row">
            <span class="row-label" th:text="${row.letter}">A</span>
            <div class="seats">
                <div th:each="seat : ${row.seats}"
                     th:class="'seat ' + (${seat.occupied} ? 'occupied' : 'available')"
                     th:attr="data-seat=${row.letter + seat.number}"
                     th:text="${seat.number}">
                </div>
            </div>
            <span class="row-label" th:text="${row.letter}">A</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="seat available"></div>
            <span>Available</span>
        </div>
        <div class="legend-item">
            <div class="seat occupied"></div>
            <span>Occupied</span>
        </div>
        <div class="legend-item">
            <div class="seat selected"></div>
            <span>Selected</span>
        </div>
    </div>

    <div class="confirm-panel" id="confirmPanel">
        <form th:action="@{/reservation}" method="post">
            <input type="hidden" name="movie"      th:value="${movie}"/>
            <input type="hidden" name="hallNumber" id="hallNumberHidden" value=""/>
            <input type="hidden" name="showtimeId" id="showtimeIdInput" value=""/>
            <input type="hidden" name="seats"      value="1"/>
            <input type="hidden" name="seatLabel"  id="seatLabelInput" value=""/>

            <div class="confirm-header">
                <h3>🎟️ Complete Your Reservation</h3>
                <div class="confirm-movie-badge">
                    <span class="movie-name" th:text="${movie}"></span>
                    <span class="seat-badge">💺 <span id="selectedSeatLabel">-</span></span>
                </div>
            </div>

            <div class="confirm-fields">
                <div class="field-group">
                    <label><span class="field-icon">👤</span>Your Name</label>
                    <input type="text" name="name" placeholder="e.g. John Smith"
                           required autocomplete="off"/>
                </div>
                <div class="confirm-row">
                    <div class="field-group">
                        <label><span class="field-icon">🏛️</span>Hall</label>
                        <input type="text" id="hallDisplay" readonly placeholder="Select a time above"/>
                    </div>
                    <div class="field-group">
                        <label><span class="field-icon">🕐</span>Show Time</label>
                        <input type="text" id="showTimeDisplay" readonly placeholder="Select a time above"/>
                    </div>
                </div>
                <div class="field-group">
                    <label><span class="field-icon">📅</span>Reservation Date</label>
                    <input type="date" name="reservationDate" required/>
                </div>
            </div>

            <button type="submit" class="btn-confirm">
                <span>✅</span> Confirm Reservation
            </button>
        </form>
    </div>

</div>

<script>
    function addEventListeners() {
        document.querySelectorAll('.seat.available').forEach(seat => {
            seat.removeEventListener('click', seatClickHandler);
            seat.addEventListener('click', seatClickHandler);
        });
    }

    function seatClickHandler() {
        const showtimeId = document.getElementById('showtimeSelect').value;
        if (!showtimeId) {
            alert('Please select a show time first!');
            return;
        }

        document.querySelectorAll('.seat.selected').forEach(s => {
            s.classList.remove('selected');
            s.classList.add('available');
        });

        this.classList.remove('available');
        this.classList.add('selected');

        const seatId = this.getAttribute('data-seat');
        document.getElementById('selectedSeatLabel').textContent = seatId;
        document.getElementById('seatLabelInput').value = seatId;
        document.getElementById('confirmPanel').classList.add('visible');
    }

    document.getElementById('showtimeSelect').addEventListener('change', function() {
        const showtimeId = this.value;
        if (!showtimeId) return;

        const hallNumber = this.options[this.selectedIndex].getAttribute('data-hall');
        const showTime = this.options[this.selectedIndex].text.split(' — ')[0];

        fetch(`/seats/occupied?showtimeId=${showtimeId}`)
            .then(res => res.json())
            .then(data => {
                const occupiedLabels = data.occupiedLabels;
                const seats = document.querySelectorAll('.cinema-hall .seat');

                seats.forEach(seat => {
                    seat.classList.remove('occupied', 'available', 'selected');
                    const seatId = seat.getAttribute('data-seat');
                    if (occupiedLabels.includes(seatId)) {
                        seat.classList.add('occupied');
                    } else {
                        seat.classList.add('available');
                    }
                });

                document.getElementById('hallNumberHidden').value = hallNumber;
                document.getElementById('showtimeIdInput').value = showtimeId;
                document.getElementById('hallDisplay').value = 'Hall ' + hallNumber;
                document.getElementById('showTimeDisplay').value = showTime;
                document.getElementById('selectedSeatLabel').textContent = '-';
                document.getElementById('seatLabelInput').value = '';
                document.getElementById('confirmPanel').classList.remove('visible');

                addEventListeners();
            });
    });

    addEventListeners();
</script>

</body>
</html>
