<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Save File - Cinema</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
  <div class="navbar-links">
    <a th:href="@{/program}">📅 Schedule</a>
    <a th:href="@{/reservations}" class="active">📋 Reservations</a>
    <a th:href="@{/hallCapacity}">💺 Capacity</a>
    <a th:href="@{/saveFile}">💾 Save File</a>
    <a th:href="@{/logout}" class="logout">⏻ Logout</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>💾 Save File</h1>
    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
  </div>

  <div th:if="${success}" class="card">
    <div class="alert alert-success">
      <span th:text="${success}"></span>
    </div>
    <p>The file <strong>reservations.txt</strong> has been saved in the project directory.</p>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <span th:text="${error}"></span>
  </div>
</div>

</body>
</html>
