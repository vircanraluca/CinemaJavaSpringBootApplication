<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Capacity - Cinema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" sec:authorize="isAuthenticated()">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/reservations}">📋 Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/saveFile}">💾 Save File</a>
        <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1>💺 Check Capacity</h1>
        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form th:action="@{/hallCapacity}" method="post">
            <div class="form-group">
                <label>Please select a hall</label>
                <select name="hallNumber" required>
                    <option value="">-- Select Hall --</option>
                    <option th:each="hall : ${halls}"
                            th:value="${hall}"
                            th:text="'Hall ' + ${hall}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Check</button>
        </form>
    </div>

    <div th:if="${availableSeats != null}" class="card">
        <h3 style="color:white;">Hall <span th:text="${hallNumber}"></span></h3>
        <p>Available seats:
            <strong th:text="${availableSeats}"
                    th:class="${availableSeats == 0} ? 'text-danger' : 'text-success'">
            </strong>
            / 20
        </p>
        <div th:if="${availableSeats == 0}" class="alert alert-error">
            All seats are booked!
        </div>
    </div>

</div>

</body>
</html>
