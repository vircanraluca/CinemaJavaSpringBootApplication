<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Reservations - Cinema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar" sec:authorize="isAuthenticated()">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/reservations}">📋 Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/saveFile}">💾 Save File</a>
        <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
        <a th:href="@{/admin/statistics}" sec:authorize="hasRole('ROLE_ADMIN')">📊 Statistics</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>
<div class="container">
    <div class="header">
        <h1>📋 Reservations</h1>
        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form th:action="@{/reservations}" method="post">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>👤 Name</label>
                    <input type="text" name="name" th:value="${name}" placeholder="Search by name"/>
                </div>
                <div class="form-group">
                    <label>🎬 Movie</label>
                    <input type="text" name="movie" th:value="${movie}" placeholder="Search by movie"/>
                </div>
                <div class="form-group">
                    <label>🏛️ Hall</label>
                    <select name="hallNumber">
                        <option value="">-- All halls --</option>
                        <option th:each="hall : ${halls}"
                                th:value="${hall}"
                                th:text="'Hall ' + ${hall}"
                                th:selected="${hall == hallNumber}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📅 Date</label>
                    <input type="date" name="date" th:value="${date}"/>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:16px;">
                <button type="submit" class="btn btn-primary">🔍 Search</button>
                <a th:href="@{/reservations}" class="btn btn-secondary">✕ Reset</a>
            </div>
        </form>
    </div>

    <div th:if="${reservations != null}">
        <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-error">
            No reservations found for the selected filters.
        </div>

        <div th:if="${!#lists.isEmpty(reservations)}">
            <h3>Found <span th:text="${#lists.size(reservations)}"></span> reservation(s)</h3>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Movie</th>
                    <th>Hall</th>
                    <th>Seats</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservations}">
                    <td th:text="${reservation.id}"></td>
                    <td th:text="${reservation.name}"></td>
                    <td th:text="${reservation.movie}"></td>
                    <td th:text="'Hall ' + ${reservation.hallNumber}"></td>
                    <td th:text="${reservation.seats}"></td>
                    <td th:text="${reservation.reservationDate}"></td>
                    <td>
                        <form th:action="@{/deleteReservation}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this reservation?')">
                            <input type="hidden" name="id" th:value="${reservation.id}"/>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
