<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservations - Cinema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/reservations}" class="active">📋 Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>
<div class="container">
    <div class="header">
        <h1>📋 Reservations</h1>
        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form th:action="@{/reservations}" method="post">
            <div class="form-group">
                <label>Search by name</label>
                <input type="text" name="name" th:value="${name}" placeholder="Insert the name" required/>
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
    </div>

    <div th:if="${reservations != null}">

        <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-error">
            No reservations found for <strong th:text="${name}"></strong>
        </div>

        <div th:if="${!#lists.isEmpty(reservations)}">
            <h3>Reservations for <span th:text="${name}"></span>:</h3>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Movie</th>
                    <th>Hall</th>
                    <th>Seats</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservations}">
                    <td th:text="${reservation.id}"></td>
                    <td th:text="${reservation.movie}"></td>
                    <td th:text="'Hall ' + ${reservation.hallNumber}"></td>
                    <td th:text="${reservation.seats}"></td>
                    <td th:text="${reservation.reservationDate}"></td>
                    <td>
                        <form th:action="@{/deleteReservation}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this reservation?')">
                            <input type="hidden" name="id" th:value="${reservation.id}"/>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
