<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Capacitate - Cinema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Program</a>
        <a th:href="@{/afisareRezervari}" class="active">📋 Reservations</a>
        <a th:href="@{/verificareCapacitate}">💺 Capacity</a>
        <a th:href="@{/salveazaFisier}">💾 Save files</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1>💺 Check capacity</h1>
        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form th:action="@{/verificareCapacitate}" method="post">
            <div class="form-group">
                <label>Please select the hall</label>
                <select name="nrSala" required>
                    <option value="">-- Select the hall --</option>
                    <option th:each="sala : ${sali}"
                            th:value="${sala}"
                            th:text="'Sala ' + ${sala}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Check</button>
        </form>
    </div>

    <!-- Rezultat -->
    <div th:if="${locuriLibere != null}" class="card">
        <h3>Hall <span th:text="${nrSala}"></span></h3>
        <p>Available seats:
            <strong th:text="${locuriLibere}"
                    th:class="${locuriLibere == 0} ? 'text-danger' : 'text-success'">
            </strong>
            / 20
        </p>
        <div th:if="${locuriLibere == 0}" class="alert alert-error">
            All the seats are booked!
        </div>
    </div>

</div>

</body>
</html>
