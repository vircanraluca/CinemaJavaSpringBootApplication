<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rezervări - Cinema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Program</a>
        <a th:href="@{/afisareRezervari}" class="active">📋 Reservations</a>
        <a th:href="@{/verificareCapacitate}">💺 Capacity</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>
<div class="container">
    <div class="header">
        <h1>📋 Reservations</h1>
        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form th:action="@{/afisareRezervari}" method="post">
            <div class="form-group">
                <label>Search by name</label>
                <input type="text" name="nume" th:value="${nume}" placeholder="Insert the name" required/>
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
    </div>

    <!-- Rezultate -->
    <div th:if="${rezervari != null}">

        <div th:if="${#lists.isEmpty(rezervari)}" class="alert alert-error">
            Reservation are not available for <strong th:text="${nume}"></strong>
        </div>

        <div th:if="${!#lists.isEmpty(rezervari)}">
            <h3>Reservation for  <span th:text="${nume}"></span>:</h3>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Movie</th>
                    <th>Hall</th>
                    <th>Seats</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rez : ${rezervari}">
                    <td th:text="${rez.id}"></td>
                    <td th:text="${rez.film}"></td>
                    <td th:text="'Sala ' + ${rez.nrSala}"></td>
                    <td th:text="${rez.locuri}"></td>
                    <td th:text="${rez.dataRezervare}"></td>
                    <td>
                        <form th:action="@{/stergeRezervare}" method="post"
                              onsubmit="return confirm('Sigur doriți să ștergeți rezervarea?')">
                            <input type="hidden" name="id" th:value="${rez.id}"/>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
