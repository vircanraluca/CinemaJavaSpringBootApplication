<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirmed reservations</title>
  <link rel="stylesheet" th:href="@{/css/seats.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
  <div class="navbar-links">
    <a th:href="@{/program}">📅 Program</a>
    <a th:href="@{/afisareRezervari}" class="active">📋 Reservations</a>
    <a th:href="@{/verificareCapacitate}">💺 Capacity</a>
    <a th:href="@{/salveazaFisier}">💾 Save files</a>
    <a th:href="@{/logout}" class="logout">⏻ Logout</a>
  </div>
</nav>

<div class="page-container">
  <div class="confirmare-card">

    <div class="check-icon">✅</div>

    <h1>Rezervare Confirmată!</h1>
    <p class="subtitle">Thank you for your reservation!</p>

    <div class="confirmare-details">
      <div class="detail-row">
        <span class="detail-label">🎬 Movie</span>
        <span class="detail-value" th:text="${film}"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">📅 Data</span>
        <span class="detail-value" th:text="${data}"></span>
      </div>
    </div>

    <div class="confirmare-actions">
      <a th:href="@{/program}" class="btn-action">📅 Back to the Program Page</a>
      <a th:href="@{/afisareRezervari}" class="btn-action btn-secondary">📋 Reservations </a>
    </div>

  </div>
</div>

</body>
</html>
