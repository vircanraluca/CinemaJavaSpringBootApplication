<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cinema Schedule</title>
    <link rel="stylesheet" th:href="@{/css/program.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" sec:authorize="isAuthenticated()">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/program}">📅 Schedule</a>
        <a th:href="@{/reservations}">📋 Reservations</a>
        <a th:href="@{/hallCapacity}">💺 Capacity</a>
        <a th:href="@{/saveFile}">💾 Save File</a>
        <a th:href="@{/admin/movies}" sec:authorize="hasRole('ROLE_ADMIN')">🎬 Manage Movies</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="page-container">

    <h1 class="page-title">📅 Cinema Schedule</h1>

    <div class="filters-card">
        <form th:action="@{/program}" method="get" class="filters-form">
            <div class="filter-group">
                <label>🔤 Title</label>
                <input type="text" name="title" th:value="${selectedTitle}" placeholder="Search by title"/>
            </div>
            <div class="filter-group">
                <label>🎭 Genre</label>
                <select name="genre">
                    <option value="">All genres</option>
                    <option th:each="g : ${genres}"
                            th:value="${g}"
                            th:text="${g}"
                            th:selected="${g == selectedGenre}">
                    </option>
                </select>
            </div>
            <div class="filter-actions">
                <button type="submit" class="btn-filter">🔍 Filter</button>
                <a th:href="@{/program}" class="btn-reset">✕ Reset</a>
            </div>
        </form>
    </div>

    <div th:if="${movies.empty}" class="empty-state">
        <span>🎭</span>
        <p>No movies found for the selected genre.</p>
    </div>

    <div th:if="${!movies.empty}" class="program-grid">
        <div th:each="movie : ${movies}" class="program-card">
            <div class="card-poster">
                <img th:src="${movie.image}" th:alt="${movie.title}"
                     onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'"/>
            </div>
            <div class="card-header">
                <span class="film-title" th:text="${movie.title}"></span>
                <span class="gen-badge" th:text="${movie.genre}"></span>
            </div>
            <div class="card-body">
                <div class="card-row">
                    <span class="label">⏱️ Duration</span>
                    <span th:text="${movie.duration} + ' min'"></span>
                </div>
                <div class="card-row">
                    <span class="label">📅 Year</span>
                    <span th:text="${movie.year}"></span>
                </div>
                <div class="card-desc" th:text="${movie.description}"></div>
                <a th:href="@{/seats(movie=${movie.title}, hallNumber=1, reservationDate=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')})}"
                   class="btn-rezerva">🎟️ Reserve Now</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
