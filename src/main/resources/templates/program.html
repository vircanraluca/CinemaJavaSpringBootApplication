<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ro">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Program Cinema</title>
    <link rel="stylesheet" th:href="@{/css/program.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">🎬 <span>Cinema</span> App</a>
    <div class="navbar-links">
        <a th:href="@{/rezervare}">🎟️ Rezervare nouă</a>
        <a th:href="@{/program}" class="active">📅 Program</a>
        <a th:href="@{/afisareRezervari}">📋 Rezervările mele</a>
        <a th:href="@{/verificareCapacitate}">💺 Capacitate</a>
        <a th:href="@{/logout}" class="logout">⏻ Logout</a>
    </div>
</nav>

<div class="page-container">

    <h1 class="page-title">📅 Program Cinema</h1>

    <!-- FILTRE -->
    <div class="filters-card">
        <form th:action="@{/program}" method="get" class="filters-form">
            <div class="filter-group">
                <label>🎭 Gen</label>
                <select name="gen">
                    <option value="">Toate genurile</option>
                    <option th:each="g : ${genuri}"
                            th:value="${g}"
                            th:text="${g}"
                            th:selected="${g == genSelectat}">
                    </option>
                </select>
            </div>
            <div class="filter-actions">
                <button type="submit" class="btn-filter">🔍 Filtrează</button>
                <a th:href="@{/program}" class="btn-reset">✕ Resetează</a>
            </div>
        </form>
    </div>

    <!-- FILME -->
    <div th:if="${filme.empty}" class="empty-state">
        <span>🎭</span>
        <p>Nu există filme pentru genul selectat.</p>
    </div>

    <div th:if="${!filme.empty}" class="program-grid">
        <div th:each="film : ${filme}" class="program-card">
            <div class="card-poster">
                <img th:src="${film.imagine}" th:alt="${film.titlu}"
                     onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'"/>
            </div>
            <div class="card-header">
                <span class="film-title" th:text="${film.titlu}"></span>
                <span class="gen-badge" th:text="${film.gen}"></span>
            </div>
            <div class="card-body">
                <div class="card-row">
                    <span class="label">⏱️ Durată</span>
                    <span th:text="${film.durata} + ' min'"></span>
                </div>
                <div class="card-row">
                    <span class="label">📅 An</span>
                    <span th:text="${film.an}"></span>
                </div>
                <div class="card-desc" th:text="${film.descriere}"></div>
                <a th:href="@{/seats(film=${film.titlu}, nrSala=1, dataRezervare=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')})}"
                   class="btn-rezerva">🎟️ Rezervă</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
